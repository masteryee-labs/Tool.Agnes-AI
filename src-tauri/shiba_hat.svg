
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f8ff"/>

  <!-- Ears -->
  <path d="M 120 140 L 100 60 L 160 110 Z" fill="#d2691e"/>
  <path d="M 280 140 L 300 60 L 240 110 Z" fill="#d2691e"/>
  <!-- Inner Ears -->
  <path d="M 125 130 L 110 75 L 150 115 Z" fill="#fff5ee"/>
  <path d="M 275 130 L 290 75 L 250 115 Z" fill="#fff5ee"/>

  <!-- Head -->
  <ellipse cx="200" cy="180" rx="90" ry="80" fill="#d2691e"/>

  <!-- Face White Markings -->
  <path d="M 130 180 Q 200 250 270 180 Q 280 220 200 260 Q 120 220 130 180 Z" fill="#fff5ee"/>
  <ellipse cx="200" cy="150" rx="60" ry="40" fill="#fff5ee"/>

  <!-- Eyes -->
  <ellipse cx="160" cy="170" rx="10" ry="12" fill="#3e2723"/>
  <ellipse cx="240" cy="170" rx="10" ry="12" fill="#3e2723"/>
  <!-- Eye Highlights -->
  <circle cx="163" cy="167" r="3" fill="white"/>
  <circle cx="243" cy="167" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="200" cy="210" rx="12" ry="8" fill="#3e2723"/>
  <ellipse cx="200" cy="208" rx="4" ry="2" fill="#5d4037"/>

  <!-- Mouth -->
  <path d="M 185 225 Q 200 235 215 225" fill="none" stroke="#3e2723" stroke-width="2"/>

  <!-- Hat (Baseball Cap) -->
  <!-- Back of hat -->
  <path d="M 110 130 Q 200 90 290 130 L 290 110 Q 200 70 110 110 Z" fill="#2c3e50"/>
  <!-- Brim -->
  <path d="M 90 130 Q 200 160 310 130 Q 200 140 90 130 Z" fill="#34495e"/>
  <!-- Button on top -->
  <circle cx="200" cy="100" r="5" fill="#2c3e50"/>
  
  <!-- Hat Logo (Simple Star) -->
  <polygon points="200,105 205,115 215,115 207,122 210,132 200,126 190,132 193,122 185,115 195,115" fill="#f1c40f"/>

  <!-- Neck/Body hint -->
  <path d="M 150 250 Q 200 280 250 250 L 250 400 L 150 400 Z" fill="#d2691e"/>
  <!-- White chest -->
  <path d="M 160 260 Q 200 290 240 260 L 240 400 L 160 400 Z" fill="#fff5ee"/>
</svg>
